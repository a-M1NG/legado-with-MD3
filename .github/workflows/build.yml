name: Multi-Platform Build

on:
  push:
    branches: [ main, kmp-refactor ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  # ================= Android Build =================
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check Keystore Secret Availability
        id: check-keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode Keystore (if exists)
        if: steps.check-keystore.outputs.available == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release.keystore
          echo "storeFile=keystore/release.keystore" >> gradle.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (Unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: legado-kmp-android-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: legado-kmp-android-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

  # ================= iOS Build =================
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build iOS Framework
        run: ./gradlew :shared:assembleXCFramework --no-daemon --stacktrace

      - name: Build iOS Simulator App
        run: ./gradlew :iosApp:assembleSimulatorDebug --no-daemon --stacktrace
        continue-on-error: true # May fail depending on project structure

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: legado-kmp-ios-framework
          path: shared/build/XCFrameworks/**/*
          retention-days: 7

  # ================= Desktop Build (Windows & macOS) =================
  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact-name: legado-kmp-desktop-windows
          - os: macos-latest
            artifact-name: legado-kmp-desktop-macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Desktop Distribution
        run: ./gradlew createDistributable --no-daemon --stacktrace
        shell: bash

      - name: Package Desktop App
        run: ./gradlew packageDistributionForCurrentOS --no-daemon --stacktrace
        shell: bash
        continue-on-error: true # Packaging may require specific OS configs

      - name: Upload Desktop App
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact-name }}
          path: composeApp/build/compose/binaries/**/*
          retention-days: 7

  # ================= Web Build =================
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Web App
        run: ./gradlew jsBrowserProductionWebpackDistribution --no-daemon --stacktrace

      - name: Upload Web App
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: legado-kmp-web
          path: composeApp/build/dist/js/productionWebpack/**/*
          retention-days: 7

  # ================= Unit Tests =================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Common Tests
        run: ./gradlew allTests --no-daemon --stacktrace

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/build/reports/tests/**/*'
          retention-days: 3

  # ================= Static Analysis =================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon --stacktrace
        continue-on-error: true

      - name: Run Ktlint
        run: ./gradlew ktlintCheck --no-daemon --stacktrace
        continue-on-error: true

  # ================= Publish Release (Main Branch Only) =================
  publish-release:
    name: Publish Release
    needs: [android-build, ios-build, desktop-build, web-build, unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release Notes
        run: |
          echo "## Legado KMP Auto Build" > release_notes.md
          echo "" >> release_notes.md
          echo "**Commit:** ${{ github.sha }}" >> release_notes.md
          echo "**Date:** $(date -u)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Included Builds:" >> release_notes.md
          echo "- Android Debug/Release APK" >> release_notes.md
          echo "- iOS XCFramework" >> release_notes.md
          echo "- Desktop Apps (Windows/macOS)" >> release_notes.md
          echo "- Web Bundle" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: artifacts/**/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ !contains(github.ref, 'stable') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
